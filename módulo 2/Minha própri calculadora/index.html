<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobcal</title>
    <style>
        body{
            background-image: linear-gradient(to right, rgb(89,21,31),rgb(100,30,255));
        }
       .c{
         background-color: silver;
         height: 450px;
         width: 300px;
         font-size: 20px;
         margin: auto;
         padding: 20px;
         border-radius: 12px;

       }
       .b{
        color: black;
        font-size: 30px;
        height: 70px;
        width: 70px;

       }
       .b:hover{
        color: red;
       }
       #resultado{
        color: black;
        height: 50px;
        width: 300px;
        background-color: white;
        text-align: right;
        border-radius: 5px;
        
       }

   </style>

</head>
<body>
    <h1>seja bem vindo ao Kimcal</h1>
    <main class="pri">
      <main class="c">
       <p id="resultado">job</p>
        <table>
        <tr>
            <td><button class="b"  onclick="clean()">c</button></td>
            <td><button class="b" onclick="back()"><</button></td>
            <td><button class="b" onclick="insert(`/`)">/</button></td>
            <td><button class="b" onclick="insert(`*`)">*</button></td>
        </tr>

       
        <tr>
            <td><button class="b" onclick="insert(`7`)">7</button></td>
            <td><button class="b" onclick="insert(`8`)">8</button></td>
            <td><button class="b" onclick="insert(`9`)">9</button></td>
            <td><button class="b" onclick="insert(`-`)">-</button></td>
        </tr>
       
        
        <tr>
            <td><button class="b" onclick="insert(`4`)">4</button></td>
            <td><button class="b" onclick="insert(`5`)">5</button></td>
            <td><button class="b" onclick="insert(`6`)">6</button></td>
            <td><button class="b" onclick="insert(`+`)">+</button></td>
        </tr>
         
        
        <tr>
            <td><button class="b" onclick="insert(`3`)">3</button></td>
            <td><button class="b" onclick="insert(`2`)">2</button></td>
            <td><button class="b" onclick="insert(`1`)">1</button></td>
            <td><button  class="b" onclick="ig()" >=</button></td>
        </tr>
    

        <tr>
            <td><button class="b" onclick="insert(`0`)">0</button></td>
            <td><button  class="b" onclick="insert(`.`)">.</button></td>

        </tr>
       
           
        </table>

      </main>


    </main>
    <script>
     function insert(num){
        var numero = document.getElementById(`resultado`).innerHTML;
        document.getElementById(`resultado`).innerHTML = numero+num;
     }
      
     function clean(){
        document.getElementById(`resultado`).innerHTML = "";

     }

     function back(){
        var numero = document.getElementById(`resultado`).innerHTML ;
        document.getElementById(`resultado`).innerHTML = numero.substring(0,numero.length -1);
     }
      
     function ig(){
        var i = window.document.getElementById(`resultado`).innerHTML;  
          document.getElementById(`resultado`).innerHTML = eval(i); 
        
    
     }

    </script>

</body>
</html>
